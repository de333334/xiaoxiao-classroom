<title>晓晓老师的「不慌课」全集 · 第5-6课 + 六课总复习（永久网页）</title>
<style>
  :root{
    --bg:#f4f1ea; --board:#2f5d50; --board2:#3a6f60; --chalk:#f7f3e8;
    --ink:#2b2b2b; --pink:#ef8fa0; --blue:#6ea8d8; --yellow:#f3c969;
    --card:#ffffff; --soft:#fff8ec; --fs:20px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"宋体","SimSun",serif;
    background:var(--bg); color:var(--ink); line-height:1.85;
    font-size:var(--fs);
  }
  .wrap{max-width:900px; margin:0 auto; padding:14px 16px 150px;}
  header{display:flex; align-items:center; gap:12px; padding:10px 4px 14px;}
  header .ttl{font-size:1.15em; font-weight:800;}
  header .ttl small{display:block; font-weight:500; font-size:0.7em; color:#777;}

  .avatar{width:56px; height:56px; border-radius:50%; flex:0 0 auto;
    background:radial-gradient(circle at 50% 35%, #ffe2c2, #ffc89b);
    border:3px solid #fff; box-shadow:0 4px 10px rgba(0,0,0,.12); position:relative;}
  .avatar svg{width:100%;height:100%;}
  .speaking{animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 4px 10px rgba(0,0,0,.12);}50%{box-shadow:0 0 0 8px rgba(239,143,160,.25);}}

  .chips{display:flex; flex-wrap:wrap; gap:8px; margin:4px 0 12px;}
  .chip{background:var(--card); border:2px solid #e3ddd0; border-radius:14px; padding:8px 14px;
    font-size:.9em; font-weight:700; cursor:pointer; color:var(--ink); font-family:inherit; transition:.15s;}
  .chip:hover{border-color:var(--pink);}
  .chip.active{background:var(--pink); color:#fff; border-color:var(--pink);}

  .board{background:linear-gradient(160deg,var(--board),var(--board2)); color:var(--chalk);
    border-radius:18px; padding:22px 22px 26px; min-height:200px; position:relative;
    box-shadow:0 10px 24px rgba(0,0,0,.18), inset 0 0 0 4px rgba(255,255,255,.06);}
  .board h2{margin:.1em 0 .5em; font-size:1.2em; color:#ffe7a8;}
  .board p{margin:.5em 0; font-size:1.05em;}
  .board .tag{display:inline-block; background:rgba(255,255,255,.14);
    padding:2px 10px; border-radius:999px; font-size:0.72em; margin-bottom:8px;}
  .board .rhyme{font-family:"KaiTi","STKaiti",serif; font-size:1.08em; line-height:2;
    background:rgba(0,0,0,.18); border-left:4px solid var(--yellow); padding:10px 14px; border-radius:8px; margin-top:10px;}
  .board a{color:#ffe7a8;}

  .caseimg{width:100%; max-width:380px; height:auto; display:block; margin:12px auto;
    background:#fff; border:2px solid #efe8da; border-radius:14px; padding:8px;}

  .peer{display:flex; gap:12px; align-items:flex-start; background:var(--soft);
    border:2px dashed #e6c98a; border-radius:16px; padding:14px 16px; margin-top:14px;}
  .peer .who{font-weight:800; color:#c97b2c; white-space:nowrap; font-size:1em;}
  .peer .q{font-size:1.05em;}

  .dots{display:flex; flex-wrap:wrap; gap:6px; margin:16px 0 4px;}
  .dot{width:13px; height:13px; border-radius:50%; background:#d8d2c4; cursor:pointer; transition:.15s;}
  .dot:hover{transform:scale(1.2);}
  .dot.done{background:#6ea8d8;}
  .dot.cur{background:var(--pink); transform:scale(1.35);}

  .seekwrap{display:flex; align-items:center; gap:10px; margin:12px 0 4px;
    background:var(--card); border:2px solid #efe8da; border-radius:12px; padding:8px 12px;}
  .seekwrap input[type=range]{flex:1; accent-color:var(--pink); height:6px; cursor:pointer;}
  .seekwrap .mini{font-size:0.72em; color:#888; white-space:nowrap;}

  .bar{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:14px;}
  button.ctrl{background:var(--card); border:2px solid #e3ddd0; border-radius:12px;
    padding:9px 16px; font-size:0.9em; font-weight:700; cursor:pointer; color:var(--ink);
    font-family:inherit; transition:.15s;}
  button.ctrl:hover{border-color:var(--pink);}
  button.primary{background:var(--pink); color:#fff; border-color:var(--pink);}
  button.primary:hover{filter:brightness(1.05);}
  button.ctrl:disabled{opacity:.4; cursor:not-allowed; border-color:#e3ddd0;}
  select.ctrl{border:2px solid #e3ddd0; border-radius:12px; padding:8px 10px; font-size:0.85em;
    background:#fff; font-family:inherit;}
  .mini{font-size:0.78em; color:#888;}
  .sent{font-size:0.78em; color:#9a9486; margin-left:auto;}

  .ask{background:var(--card); border-radius:16px; padding:18px; margin-top:14px;
    box-shadow:0 6px 16px rgba(0,0,0,.08); border:2px solid #efe8da;}
  .ask .label{font-weight:800; color:#3a6f60; margin-bottom:8px; font-size:1em;}
  .ask .opts{display:flex; flex-direction:column; gap:8px; margin:10px 0;}
  .ask .opt{border:2px solid #e3ddd0; border-radius:12px; padding:10px 14px; cursor:pointer; font-size:1em;}
  .ask .opt:hover{border-color:var(--blue);}
  .ask .opt.pick{border-color:var(--pink); background:#fff3f5;}
  .ask .opt.right{border-color:#4caf72; background:#eefaf1;}
  .ask .opt.wrong{border-color:#e57373; background:#fdeeee;}
  textarea{width:100%; min-height:90px; border:2px solid #e3ddd0; border-radius:12px;
    padding:10px 12px; font-size:1em; font-family:inherit; resize:vertical; line-height:1.7;}
  .fb{margin-top:12px; padding:12px 14px; border-radius:12px; font-size:1em; display:none;}
  .fb.ok{background:#eefaf1; border:1px solid #bfe6c9; display:block;}
  .fb.no{background:#fff6ec; border:1px solid #f0d3a6; display:block;}

  #endNav{display:none; flex-wrap:wrap; gap:8px; margin-top:14px;}
  .subbar{position:fixed; left:0; right:0; bottom:0; background:rgba(20,20,20,.92);
    color:#fff; padding:12px 16px; font-size:calc(var(--fs) * 0.95); text-align:center; min-height:54px;
    display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); z-index:50;}
  .subbar .now{color:#ffe7a8; font-weight:700; margin-right:6px; white-space:nowrap;}
  .hint{font-size:0.74em; color:#9a9486; margin-top:10px;}
  .badge{display:inline-block; background:var(--yellow); color:#5a4410; font-weight:800;
    border-radius:8px; padding:1px 8px; font-size:0.85em; margin-right:6px;}
</style>
</head>

<script>
/* ============ 各章课程内容（从已发布课程提取 / 总复习新写） ============ */
const SEG5 = [{"type":"talk","tag":"复习小课堂","title":"先复习前四课（上课前先翻笔记）","lines":["上课前，咱们先把前四课学的招数翻出来复习一下。","第1课：别人慌的时候你在旁边看，叫旁观者清，偷师学冷静，四步口诀是一停二看三想四做。","第2课加一招：慌到说不出话，喊个帮手也不孬，比如找老师、找大人。","第3课：万一出丑的人就是你自己，用自嘲加转身做正事，还能替别人关上一扇门。","第4课是最厉害的一招：提前彩排，给慌张写个剧本，出事之前先练好。","今天，咱们加最后一课：亲眼看见别人被欺负，怎么管才不慌、不添乱。"],"html":"<p>上课前，咱们先把前四课学的招数翻出来复习一下。</p>\n      <svg class=\"caseimg\" viewBox=\"0 0 360 170\" role=\"img\" aria-label=\"复习第1到4课，第5课新加\">\n        <circle cx=\"46\" cy=\"60\" r=\"38\" fill=\"#f3c969\"/>\n        <text x=\"46\" y=\"69\" font-size=\"26\" text-anchor=\"middle\" fill=\"#5a4410\">复习</text>\n        <rect x=\"104\" y=\"14\" width=\"244\" height=\"22\" rx=\"8\" fill=\"#fff\" stroke=\"#e6c98a\"/>\n        <text x=\"116\" y=\"30\" font-size=\"13\" fill=\"#5a5448\">第1课 · 旁观者清 ＋ 一停二看三想四做</text>\n        <rect x=\"104\" y=\"44\" width=\"244\" height=\"22\" rx=\"8\" fill=\"#fff\" stroke=\"#e6c98a\"/>\n        <text x=\"116\" y=\"60\" font-size=\"13\" fill=\"#5a5448\">第2课 · 喊帮手也是冷静</text>\n        <rect x=\"104\" y=\"74\" width=\"244\" height=\"22\" rx=\"8\" fill=\"#fff\" stroke=\"#e6c98a\"/>\n        <text x=\"116\" y=\"90\" font-size=\"13\" fill=\"#5a5448\">第3课 · 自嘲 ＋ 转身做正事 ＋ 关门</text>\n        <rect x=\"104\" y=\"104\" width=\"244\" height=\"22\" rx=\"8\" fill=\"#fff\" stroke=\"#e6c98a\"/>\n        <text x=\"116\" y=\"120\" font-size=\"13\" fill=\"#5a5448\">第4课 · 提前彩排 ＋ 写剧本</text>\n        <rect x=\"104\" y=\"134\" width=\"244\" height=\"22\" rx=\"8\" fill=\"#ffe7a8\" stroke=\"#e6c98a\"/>\n        <text x=\"116\" y=\"150\" font-size=\"13\" fill=\"#5a4410\">第5课（新）· 看见别人被欺负，稳稳出手</text>\n      </svg>\n      <p>前四课你学会了：看别人慌（第1课）、喊帮手（第2课）、自己出丑怎么圆（第3课）、提前彩排（第4课）。今天加最后一课——<b>亲眼看见别人被欺负，怎么管才不慌、不添乱</b>。</p>"},{"type":"ask","mode":"open","q":"费曼复习：用你自己的话，说说「一停二看三想四做」是哪四步？（随便说，说错也没关系）","hint":"比如：停三秒别急；看清局面；想一句不慌的话或一条退路；轻轻接话、悄悄离开、或报告大人。","fbOk":"说出来了就好！费曼学习法最管用的一招就是「讲出来」。记不住也没事，今天上完课，几首口诀你会背得更熟。"},{"type":"talk","tag":"新角度","title":"第5课：看见别人被欺负，我怎么管","lines":["前四课，你学会了看别人慌、喊帮手、自己出丑怎么圆、还有提前彩排。","可有个场面你一定也怕：要是你亲眼看见别人被欺负、被虐待，你站在一旁，会不会慌？会不会不知道该不该管、怎么管？","今天这一课，就讲这个——该出手时，怎么稳稳地出手。","咱们借一个2025年春天的真实新闻，特别适合你这种没见过大风大浪的人学。"],"html":"<p>前四课，你学会了看别人慌、喊帮手、自己出丑怎么圆、还有提前彩排。</p><p>可有个场面你一定也怕：<b>要是你亲眼看见别人被欺负、被虐待，你站在一旁，会不会慌？会不会不知道该不该管、怎么管？</b></p><p>今天这一课，就讲这个——<b>该出手时，怎么稳稳地出手</b>。</p><p>咱们借一个 2025 年春天的真实新闻，特别适合你这种没见过大风大浪的人学。</p>"},{"type":"talk","tag":"真实事例","title":"真实新闻：柳州中学生被欺凌，路人市民稳稳救下","lines":["2025年3月，广西柳州。两个隔壁班的中学生，网上吵了几句，结了梁子。","其中一个男生，叫上几个同学，把另一个男生带到小区附近，推搡、打骂、欺负。","这时候，一个开车路过的普通市民看见了。他没有装没看见，也没有冲上去跟那帮孩子打起来。","他先稳住自己，大声把这场欺负制止住，然后立刻报了警。","结果呢？被欺负的男生身体没大碍。警察来了，对欺负人的学生训诫、让他们道歉。教育局还专门表扬了这个热心市民。"],"html":"<p>2025 年 3 月，广西柳州。两个隔壁班的中学生，网上吵了几句，结了梁子。</p><p>其中一个男生，叫上几个同学，把另一个男生带到小区附近，<b>推搡、打骂、欺负</b>。</p>\n      <svg class=\"caseimg\" viewBox=\"0 0 360 170\" role=\"img\" aria-label=\"市民停车制止欺负并报警\">\n        <text x=\"78\" y=\"96\" font-size=\"56\" text-anchor=\"middle\">🚗</text>\n        <text x=\"190\" y=\"92\" font-size=\"52\" text-anchor=\"middle\">🛑</text>\n        <text x=\"290\" y=\"96\" font-size=\"56\" text-anchor=\"middle\">🚓</text>\n        <text x=\"180\" y=\"158\" font-size=\"14\" text-anchor=\"middle\" fill=\"#5a5448\">市民：住手！我已经报警了！</text>\n      </svg>\n      <p>这时候，一个开车路过的普通市民看见了。他<b>没有装没看见，也没有冲上去跟那帮孩子打起来</b>。</p><p>他先稳住自己，大声把这场欺负制止住，然后<b>立刻报了警</b>。</p><p>结果呢？被欺负的男生身体没大碍。警察来了，对欺负人的学生训诫、让他们道歉。教育局还专门<b>表扬了这个热心市民</b>。</p>"},{"type":"talk","tag":"对比一下","title":"同样看见别人被欺负，三种「慌」法","lines":["你可能会说，这市民真勇敢。可你再想想：同样看见别人被欺负，很多人会怎么慌？","第一种，假装没看见，绕道走。心里想：多一事不如少一事。","第二种，举着手机猛拍，发到网上，却不上前、也不报警。这叫围观，不叫帮忙。","第三种，最危险：二话不说冲上去跟欺负人的人扭打，结果自己也可能受伤、甚至惹上麻烦。","这市民聪明在哪？他既没溜，也没光拍，更没硬拼——他先稳住自己，大喊制止，马上喊帮手。"],"html":"<p>你可能会说，这市民真勇敢。可你再想想：同样看见别人被欺负，很多人会怎么慌？</p>\n      <svg class=\"caseimg\" viewBox=\"0 0 360 150\" role=\"img\" aria-label=\"三种慌乱的旁观者对比一种稳的\">\n        <text x=\"58\" y=\"64\" font-size=\"40\" text-anchor=\"middle\">🙈</text>\n        <text x=\"58\" y=\"108\" font-size=\"13\" text-anchor=\"middle\" fill=\"#5a5448\">装没看见溜走</text>\n        <text x=\"150\" y=\"64\" font-size=\"40\" text-anchor=\"middle\">📱</text>\n        <text x=\"150\" y=\"108\" font-size=\"13\" text-anchor=\"middle\" fill=\"#5a5448\">只拍不发不报警</text>\n        <text x=\"242\" y=\"64\" font-size=\"40\" text-anchor=\"middle\">💥</text>\n        <text x=\"242\" y=\"108\" font-size=\"13\" text-anchor=\"middle\" fill=\"#5a5448\">冲上去硬拼</text>\n        <text x=\"318\" y=\"64\" font-size=\"38\" text-anchor=\"middle\">✅</text>\n        <text x=\"318\" y=\"108\" font-size=\"13\" text-anchor=\"middle\" fill=\"#2e7d4f\">稳住喊报警</text>\n      </svg>\n      <p>第一种，<b>假装没看见，绕道走</b>。心里想：多一事不如少一事。第二种，<b>举着手机猛拍，发到网上，却不上前、也不报警</b>——这叫围观，不叫帮忙。第三种，最危险：<b>二话不说冲上去跟欺负人的人扭打</b>，结果自己也可能受伤、甚至惹上麻烦。</p><p>这市民聪明在哪？他既没溜，也没光拍，更没硬拼——他<b>先稳住自己，大喊制止，马上喊帮手</b>。</p>"},{"type":"ask","mode":"choice","q":"柳州市民做对了哪一步？","options":["A. 他装没看见，赶紧开车走了","B. 他冲上去跟那帮孩子打了一架","C. 他先稳住、大声制止，再立刻报警喊帮手","D. 他只拍了视频发到网上"],"answer":2,"fbOk":"答对！选 C。他既没溜走，也没硬拼，而是先稳住自己、大声制止、立刻报警。这才是最稳、最管用的帮忙方式。","fbNo":"再想想～装没看见（A）、硬拼（B）、只拍不发（D）都不算帮上忙。关键是 C：先稳住、大声制止、立刻报警喊帮手。"},{"type":"talk","tag":"提炼","title":"今天的三招：该出手时，稳稳地出手","lines":["招1，先判断安全。能不能帮、自己会不会有危险？能帮才帮，不能帮就喊大人、报警。","招2，用喊代替打。大声说「住手！我已经报警了！」——这比动手更安全，也更管用。","招3，喊对帮手。立刻打110，或找穿制服的警察、保安、老师。把帮手电话提前彩排好，这就接上了第4课。"],"html":"<p><span class=\"badge\">招1</span><b>先判断安全</b>：能不能帮、自己会不会有危险？能帮才帮，不能帮就喊大人、报警。</p><p><span class=\"badge\">招2</span><b>用喊代替打</b>：大声说「住手！我已经报警了！」——这比动手更安全，也更管用。</p><p><span class=\"badge\">招3</span><b>喊对帮手</b>：立刻打 110，或找穿制服的警察、保安、老师。把帮手电话提前彩排好，这就接上了第 4 课。</p>\n      <svg class=\"caseimg\" viewBox=\"0 0 360 130\" role=\"img\" aria-label=\"判断安全-喊住手-喊帮手\">\n        <text x=\"60\" y=\"78\" font-size=\"46\" text-anchor=\"middle\">🛡️</text>\n        <text x=\"60\" y=\"116\" font-size=\"14\" text-anchor=\"middle\" fill=\"#5a5448\">判断安全</text>\n        <text x=\"180\" y=\"78\" font-size=\"46\" text-anchor=\"middle\">📢</text>\n        <text x=\"180\" y=\"116\" font-size=\"14\" text-anchor=\"middle\" fill=\"#5a5448\">喊住手</text>\n        <text x=\"300\" y=\"78\" font-size=\"46\" text-anchor=\"middle\">🚓</text>\n        <text x=\"300\" y=\"116\" font-size=\"14\" text-anchor=\"middle\" fill=\"#5a5448\">喊帮手</text>\n      </svg>"},{"type":"peer","who":"同学小问号","q":"老师，我要是也怕，不敢冲上去怎么办？","lines":["不敢硬上，一点都不丢人，那是正常的反应。","你只要做三件不危险的事：记下来，记好时间地点；悄悄打110，或者告诉老师；再找附近的大人帮忙。","这就已经是帮忙了，而且是最安全的那种。","帮忙不一定要冲在最前面。能叫来救兵，你也是个小英雄。"],"html":"<p>不敢硬上，<b>一点都不丢人</b>，那是正常的反应。</p><p>你只要做三件不危险的事：<b>记下来</b>，记好时间地点；<b>悄悄打 110</b>，或者告诉老师；再<b>找附近的大人</b>帮忙。</p><p>这就已经是帮忙了，而且是最安全的那种。</p><p>帮忙不一定要冲在最前面。<b>能叫来救兵，你也是个小英雄。</b></p>"},{"type":"talk","tag":"口诀","title":"来，背新口诀（接前四课一起念）","lines":["把今天的招数，也压成顺口溜，接在前几句后面一起念。","别人被欺负，我先稳住神；","不拍不溜不硬拼，喊住手来喊报警；","能帮就帮看安全，帮手电话提前存；","五课连成串，见义又敢为又稳。"],"rhyme":["别人被欺负，我先稳住神；","不拍不溜不硬拼，喊住手来喊报警；","能帮就帮看安全，帮手电话提前存；","五课连成串，见义又敢为又稳。"],"html":"<p>把今天的招数，也压成顺口溜，接在前几句后面一起念——</p><div class=\"rhyme\">别人被欺负，我先稳住神；<br>不拍不溜不硬拼，喊住手来喊报警；<br>能帮就帮看安全，帮手电话提前存；<br>五课连成串，见义又敢为又稳。</div>"},{"type":"ask","mode":"open","q":"费曼时间到！用自己的话，把「用喊代替打」讲给想象中的同学听——你会怎么解释？最好举一个你生活里能用的例子。","hint":"比如：看见别人被欺负，用大声制止加报警来帮忙，比自己冲上去动手更安全也更管用，还不会把自己搭进去。","fbOk":"能讲出来就赢了！费曼法就是说：你讲得清，才是真懂。哪怕只说出「用喊和报警帮忙，不硬拼」，这就对了。"},{"type":"ask","mode":"choice","q":"模拟演练：在小区里看见高年级同学欺负一个小孩，你一个人又打不过，第一步该干嘛？","options":["A. 装没看见赶紧走","B. 判断安全后大声喊「住手我报警了」，立刻打110或找保安","C. 冲上去跟高年级扭打","D. 站旁边拍视频发网上"],"answer":1,"fbOk":"对！选 B。判断安全后大声制止＋立刻报警，这就是「用喊代替打」「喊对帮手」。A是逃避，C最危险，D只是围观。","fbNo":"想想「稳稳出手」。A逃避、C硬拼最危险、D只是围观。最好选 B：判断安全后大声喊「住手我报警了」，立刻打110或找保安。"},{"type":"talk","tag":"下课","title":"今天的小结","lines":["今天借柳州那个真实新闻，学了一招：该出手时，稳稳地出手。","别人被欺负，你不慌、不溜、不硬拼，先稳住、大声制止、喊帮手，就是最好的帮忙。","前四课加今天这课，你已经攒了五招：旁观、喊帮手、自圆场、提前彩排、稳稳出手。","下课！下次在新闻里、生活里看见别人慌、别人被欺负，记得偷偷在心里彩排一遍：要是我，我会怎么做。"],"html":"<p>今天借柳州那个真实新闻，学了一招：<b>该出手时，稳稳地出手</b>。</p><p>别人被欺负，你<b>不慌、不溜、不硬拼</b>，先稳住、大声制止、喊帮手，就是最好的帮忙。</p><p>前四课加今天这课，你已经攒了五招：<b>旁观、喊帮手、自圆场、提前彩排、稳稳出手</b>。</p><p>下课！下次在新闻里、生活里看见别人慌、别人被欺负，记得偷偷在心里彩排一遍：<b>要是我，我会怎么做。</b></p>"}];
const SEG6 = [{"type":"talk","tag":"复习小课堂","title":"先复习前5课（上课前先翻笔记）","lines":["上课前，咱们先把前5课学的招数翻出来复习一下。","第1课：别人慌的时候你在旁边看，叫旁观者清，偷师学冷静，口诀是一停二看三想四做。","第2课：慌到说不出话，喊个帮手也不孬，找老师、找大人。","第3课：万一出丑的人就是你自己，用自嘲加转身做正事，还能替别人关上一扇门。","第4课：提前彩排，给慌张写个剧本，出事之前先练好。","第5课：亲眼看见别人被欺负，先稳住、大声制止、喊帮手，稳稳出手。","今天，咱们加第6课：看见别人被当众羞辱、被说难听话，我怎么学「不慌、不溜、不硬吵，用一句公道话稳稳站在对的一边」。"],"html":"<p>上课前，咱们先把前5课学的招数翻出来复习一下。</p>\n      <svg class=\"caseimg\" viewBox=\"0 0 360 200\" role=\"img\" aria-label=\"复习第1到5课，第6课新加\">\n        <circle cx=\"46\" cy=\"100\" r=\"38\" fill=\"#f3c969\"/>\n        <text x=\"46\" y=\"109\" font-size=\"26\" text-anchor=\"middle\" fill=\"#5a4410\">复习</text>\n        <rect x=\"104\" y=\"14\" width=\"244\" height=\"22\" rx=\"8\" fill=\"#fff\" stroke=\"#e6c98a\"/>\n        <text x=\"116\" y=\"30\" font-size=\"13\" fill=\"#5a5448\">第1课 · 旁观者清 ＋ 一停二看三想四做</text>\n        <rect x=\"104\" y=\"42\" width=\"244\" height=\"22\" rx=\"8\" fill=\"#fff\" stroke=\"#e6c98a\"/>\n        <text x=\"116\" y=\"58\" font-size=\"13\" fill=\"#5a5448\">第2课 · 喊帮手也是冷静</text>\n        <rect x=\"104\" y=\"70\" width=\"244\" height=\"22\" rx=\"8\" fill=\"#fff\" stroke=\"#e6c98a\"/>\n        <text x=\"116\" y=\"86\" font-size=\"13\" fill=\"#5a5448\">第3课 · 自嘲 ＋ 转身做正事 ＋ 关门</text>\n        <rect x=\"104\" y=\"98\" width=\"244\" height=\"22\" rx=\"8\" fill=\"#fff\" stroke=\"#e6c98a\"/>\n        <text x=\"116\" y=\"114\" font-size=\"13\" fill=\"#5a5448\">第4课 · 提前彩排 ＋ 写剧本</text>\n        <rect x=\"104\" y=\"126\" width=\"244\" height=\"22\" rx=\"8\" fill=\"#fff\" stroke=\"#e6c98a\"/>\n        <text x=\"116\" y=\"142\" font-size=\"13\" fill=\"#5a5448\">第5课 · 看见别人被欺负，稳稳出手</text>\n        <rect x=\"104\" y=\"154\" width=\"244\" height=\"22\" rx=\"8\" fill=\"#ffe7a8\" stroke=\"#e6c98a\"/>\n        <text x=\"116\" y=\"170\" font-size=\"13\" fill=\"#5a4410\">第6课（新）· 用一句公道话，站对的一边</text>\n      </svg>\n      <p>前5课你学会了：看别人慌（第1课）、喊帮手（第2课）、自己出丑怎么圆（第3课）、提前彩排（第4课）、看见别人被欺负怎么稳稳出手（第5课）。今天加第6课——<b>亲眼看见别人被当众羞辱、被说难听话，怎么管才不慌、不溜、不硬吵，用一句公道话稳稳站在对的一边</b>。</p>"},{"type":"ask","mode":"open","q":"费曼复习：用你自己的话，说说第5课那首顺口溜的最后一句话是什么？（随便说，接不上是正常的，说出来就算赢）","hint":"五课连成串，见义又敢为又稳。","fbOk":"说出来了就好！费曼学习法最管用的一招就是「讲出来」。记不住也没事，今天上完课，几首口诀你会背得更熟。"},{"type":"talk","tag":"新角度","title":"第6课：看见别人被当众羞辱，我怎么管","lines":["前5课，你学会了看别人慌、喊帮手、自己出丑怎么圆、提前彩排，还有看见别人被欺负怎么稳稳出手。","可还有种场面你一定也怕：要是你看见别人被当众说难听话、被羞辱、被看不起，你站在一旁，会不会慌？会不会不知道该不该管、怎么管？","这种羞辱不是动手打人，而是用话伤人：嫌弃别人的衣服脏、嘲笑别人的口音、当众否定一个人。","今天这一课，就讲这个——该亮相时，怎么用一句公道话，稳稳地站在对的一边。"],"html":"<p>前5课，你学会了看别人慌、喊帮手、自己出丑怎么圆、提前彩排，还有看见别人被欺负怎么稳稳出手。</p><p>可还有种场面你一定也怕：<b>要是你看见别人被当众说难听话、被羞辱、被看不起，你站在一旁，会不会慌？会不会不知道该不该管、怎么管？</b></p><p>这种羞辱不是动手打人，而是用话伤人：嫌弃别人的衣服脏、嘲笑别人的口音、当众否定一个人。</p><p>今天这一课，就讲这个——<b>该亮相时，怎么用一句公道话，稳稳地站在对的一边</b>。</p>"},{"type":"talk","tag":"真实事例","title":"真实新闻：北京地铁5号线，一句「我不嫌脏」暖了全网","lines":["2025年4月，北京地铁5号线上。一位老大爷嫌邻座一位男乘客衣服脏，说人家跟要饭似的，还不停辱骂。","其实那位男乘客衣服上只是有点灰，他连椅背都没靠，干干净净地坐着。","这时候，一位姓杨的女乘客看不下去了。她没有跟大爷吵架，而是直接坐到被骂的男乘客身边，说：我愿意跟他挨着，我不嫌脏。","她还轻声安慰那个被骂的人：没事儿。旁边不少乘客也看不过去，帮着说话。","后来警方通报：那个反复辱骂、扰乱秩序的老大爷，被依法行政拘留了。杨女士的一句公道话，让无数网友点赞。"],"html":"<p>2025 年 4 月，北京地铁 5 号线上。一位老大爷嫌邻座一位男乘客衣服脏，说人家跟要饭似的，还不停辱骂。</p><p>其实那位男乘客衣服上只是有点灰，他连椅背都没靠，干干净净地坐着。</p>\n      <svg class=\"caseimg\" viewBox=\"0 0 360 175\" role=\"img\" aria-label=\"地铁上杨女士坐到被骂乘客身边说我不嫌脏\">\n        <text x=\"180\" y=\"28\" font-size=\"26\" text-anchor=\"middle\">🚇 地铁5号线车厢</text>\n        <text x=\"70\" y=\"104\" font-size=\"44\" text-anchor=\"middle\">🙢</text>\n        <text x=\"70\" y=\"146\" font-size=\"13\" text-anchor=\"middle\" fill=\"#888\">大爷辱骂</text>\n        <text x=\"180\" y=\"104\" font-size=\"44\" text-anchor=\"middle\">🧑</text>\n        <text x=\"180\" y=\"146\" font-size=\"13\" text-anchor=\"middle\" fill=\"#5a5448\">被骂的乘客</text>\n        <text x=\"290\" y=\"104\" font-size=\"44\" text-anchor=\"middle\">🤝</text>\n        <text x=\"290\" y=\"146\" font-size=\"13\" text-anchor=\"middle\" fill=\"#2e7d4f\">杨女士坐下</text>\n        <text x=\"180\" y=\"170\" font-size=\"13\" text-anchor=\"middle\" fill=\"#5a5448\">「我愿意跟他挨着，我不嫌脏」</text>\n      </svg>\n      <p>这时候，一位姓杨的女乘客看不下去了。她<b>没有跟大爷吵架</b>，而是直接坐到被骂的男乘客身边，说：<b>我愿意跟他挨着，我不嫌脏</b>。</p><p>她还轻声安慰那个被骂的人：<b>没事儿</b>。旁边不少乘客也看不过去，帮着说话。</p><p>后来警方通报：那个反复辱骂、扰乱秩序的老大爷，被<b>依法行政拘留</b>了。杨女士的一句公道话，让无数网友点赞。</p>"},{"type":"talk","tag":"对比一下","title":"同样看见别人被羞辱，三种「慌」法","lines":["你可能会想，这杨女士真勇敢。可你再想想：同样看见别人被说难听话，很多人会怎么慌？","第一种，跟着起哄，或者假装没看见赶紧躲开，心想少管闲事。","第二种，不敢出声，低着头装忙，等风波过去。这种人心里其实也觉得不对，就是不敢吱声。","第三种，最上头的一种：冲上去跟骂人者大吵大闹，结果吵成一团，反而把被羞辱的人更晾在中间。","杨女士聪明在哪？她不吵不溜也不硬怼，而是用一句平和但有底气的话，直接站到了被羞辱的人那边。"],"html":"<p>你可能会想，这杨女士真勇敢。可你再想想：同样看见别人被说难听话，很多人会怎么慌？</p>\n      <svg class=\"caseimg\" viewBox=\"0 0 360 150\" role=\"img\" aria-label=\"三种慌乱旁观者对比一种稳的\">\n        <text x=\"58\" y=\"64\" font-size=\"40\" text-anchor=\"middle\">🙈</text>\n        <text x=\"58\" y=\"108\" font-size=\"13\" text-anchor=\"middle\" fill=\"#5a5448\">装没看见溜走</text>\n        <text x=\"150\" y=\"64\" font-size=\"40\" text-anchor=\"middle\">🤐</text>\n        <text x=\"150\" y=\"108\" font-size=\"13\" text-anchor=\"middle\" fill=\"#5a5448\">不敢出声装忙</text>\n        <text x=\"242\" y=\"64\" font-size=\"40\" text-anchor=\"middle\">💥</text>\n        <text x=\"242\" y=\"108\" font-size=\"13\" text-anchor=\"middle\" fill=\"#5a5448\">冲上去硬吵</text>\n        <text x=\"318\" y=\"64\" font-size=\"38\" text-anchor=\"middle\">✅</text>\n        <text x=\"318\" y=\"108\" font-size=\"13\" text-anchor=\"middle\" fill=\"#2e7d4f\">一句公道话</text>\n      </svg>\n      <p>第一种，<b>跟着起哄或假装没看见赶紧躲开</b>，心想少管闲事。第二种，<b>不敢出声，低着头装忙</b>，等风波过去——心里其实也觉得不对，就是不敢吱声。第三种，最上头：<b>冲上去跟骂人者大吵大闹</b>，结果吵成一团，反而把被羞辱的人更晾在中间。</p><p>杨女士聪明在哪？她<b>不吵不溜也不硬怼</b>，而是用一句平和但有底气的话，直接站到了被羞辱的人那边。</p>"},{"type":"ask","mode":"choice","q":"杨女士做对了哪一步？","options":["A. 她假装没看见，赶紧换到别的车厢","B. 她冲上去跟大爷大吵大闹","C. 她没吵架，而是坐到被骂的人身边说「我愿意跟他挨着，我不嫌脏」","D. 她拿出手机猛拍发到网上"],"answer":2,"fbOk":"答对！选 C。她既不溜也不硬吵，而是用一句平和却有底气的话，直接站到被羞辱的人那边。这才是又稳又有力量的帮忙方式。","fbNo":"再想想～装没看见（A）、硬吵（B）、只拍不发（D）都不算帮上忙。关键是 C：用一句公道话，安静地站在对的一边。"},{"type":"talk","tag":"提炼","title":"今天的三招：用一句公道话，稳稳站在对的一边","lines":["招1，先把人和事分开。别人骂的往往不是「你这个人」，而是他的情绪和偏见。被骂的人没做错，错在骂人者。","招2，用一句公道话代替争吵。不用跟骂人者吵，而是对被欺负的人说一句支持的话，比如「不是你的错」「我愿意挨着你」。这比吵架更暖、更有力量。","招3，该喊帮手就喊帮手。像第5课那样，必要时找工作人员、乘警或报警。这次警方依法处理了骂人者，就是一个例子。"],"html":"<p><span class=\"badge\">招1</span><b>先把人和事分开</b>：别人骂的往往不是「你这个人」，而是他的情绪和偏见。被骂的人没做错，错在骂人者。</p><p><span class=\"badge\">招2</span><b>用一句公道话代替争吵</b>：不用跟骂人者吵，而是对被欺负的人说一句支持的话，比如「不是你的错」「我愿意挨着你」。这比吵架更暖、更有力量。</p><p><span class=\"badge\">招3</span><b>该喊帮手就喊帮手</b>：像第 5 课那样，必要时找工作人员、乘警或报警。这次警方依法处理了骂人者，就是一个例子。</p>\n      <svg class=\"caseimg\" viewBox=\"0 0 360 130\" role=\"img\" aria-label=\"分开人/事-一句公道话-喊帮手\">\n        <text x=\"60\" y=\"78\" font-size=\"44\" text-anchor=\"middle\">🔍</text>\n        <text x=\"60\" y=\"116\" font-size=\"13\" text-anchor=\"middle\" fill=\"#5a5448\">人和事分开</text>\n        <text x=\"180\" y=\"78\" font-size=\"44\" text-anchor=\"middle\">💬</text>\n        <text x=\"180\" y=\"116\" font-size=\"13\" text-anchor=\"middle\" fill=\"#5a5448\">一句公道话</text>\n        <text x=\"300\" y=\"78\" font-size=\"44\" text-anchor=\"middle\">🚔</text>\n        <text x=\"300\" y=\"116\" font-size=\"13\" text-anchor=\"middle\" fill=\"#5a5448\">喊帮手</text>\n      </svg>"},{"type":"peer","who":"同学小问号","q":"老师，我要是也怕，不敢出声怎么办？","lines":["不敢出声，一点都不丢人，那是正常的反应。","你只要做三件不危险的事：记下来，记好时间地点；悄悄找工作人员或打110；再找身边的大人、乘务员帮忙。","哪怕你只是事后对被欺负的人说一句「刚才不是你的错」，那也是帮忙。","帮忙不一定要冲在最前面。能替对方说一句公道话，或者叫来救兵，你就是那个温暖的人。"],"html":"<p>不敢出声，<b>一点都不丢人</b>，那是正常的反应。</p><p>你只要做三件不危险的事：<b>记下来</b>，记好时间地点；<b>悄悄找工作人员或打 110</b>；再<b>找身边的大人、乘务员</b>帮忙。</p><p>哪怕你只是事后对被欺负的人说一句<b>「刚才不是你的错」</b>，那也是帮忙。</p><p>帮忙不一定要冲在最前面。<b>能替对方说一句公道话，或者叫来救兵，你就是那个温暖的人。</b></p>"},{"type":"talk","tag":"口诀","title":"来，背新口诀（接前5课一起念）","lines":["把今天的招数，也压成顺口溜，接在前几句后面一起念。","别人被羞辱，我先稳住神；","不溜不吵不硬怼，一句公道话暖心；","人和事要分开看，帮手电话提前存；","六课连成串，见义又敢为又稳。"],"rhyme":["别人被羞辱，我先稳住神；","不溜不吵不硬怼，一句公道话暖心；","人和事要分开看，帮手电话提前存；","六课连成串，见义又敢为又稳。"],"html":"<p>把今天的招数，也压成顺口溜，接在前几句后面一起念——</p><div class=\"rhyme\">别人被羞辱，我先稳住神；<br>不溜不吵不硬怼，一句公道话暖心；<br>人和事要分开看，帮手电话提前存；<br>六课连成串，见义又敢为又稳。</div>"},{"type":"ask","mode":"open","q":"费曼时间到！用自己的话，把「把人和事分开」讲给想象中的同学听——你会怎么解释？最好举一个你生活里能用的例子。","hint":"比如：别人骂你，骂的不是你这个人，是他自己的坏情绪。被骂的人没做错，错在骂人者。","fbOk":"能讲出来就赢了！费曼法就是说：你讲得清，才是真懂。哪怕只说出「骂的是情绪不是我」，这就对了。"},{"type":"ask","mode":"choice","q":"模拟演练：在地铁上看见有人因为衣服脏被旁边的人辱骂，你一个人又劝不住，第一步该干嘛？","options":["A. 装没看见赶紧换车厢","B. 判断安全后，坐到被骂的人身边说「我愿意挨着你」，并找乘务员或报警","C. 冲上去跟骂人者扭打","D. 站旁边拍视频发网上"],"answer":1,"fbOk":"对！选 B。不溜不硬吵，用一句公道话站到对的一边，再找工作人员/报警。A逃避、C最危险、D只是围观。","fbNo":"想想「用一句公道话稳稳站在对的一边」。A逃避、C硬吵最危险、D只是围观。最好选 B。"},{"type":"talk","tag":"下课","title":"今天的小结","lines":["今天借北京地铁那个真实新闻，学了一招：该亮相时，用一句公道话稳稳地站在对的一边。","别人被羞辱，你不慌、不溜、不硬吵，先把人和事分开，再替对方说一句公道话、喊对帮手，就是最好的帮忙。","前5课加今天这课，你已经攒了六招：旁观、喊帮手、自圆场、提前彩排、稳稳出手、用一句公道话站在对的一边。","下课！下次在新闻里、生活里看见别人被羞辱、被说难听话，记得偷偷在心里彩排一遍：要是我，我会怎么稳稳地站在对的一边。"],"html":"<p>今天借北京地铁那个真实新闻，学了一招：<b>该亮相时，用一句公道话稳稳地站在对的一边</b>。</p><p>别人被羞辱，你<b>不慌、不溜、不硬吵</b>，先把人和事分开，再替对方说一句公道话、喊对帮手，就是最好的帮忙。</p><p>前5课加今天这课，你已经攒了六招：<b>旁观、喊帮手、自圆场、提前彩排、稳稳出手、用一句公道话站在对的一边</b>。</p><p>下课！下次在新闻里、生活里看见别人被羞辱、被说难听话，记得偷偷在心里彩排一遍：<b>要是我，我会怎么稳稳地站在对的一边。</b></p>"}];

/* ============ 章节与全局 ============ */
let SEG = [];
let GLOBAL = [];
const CHAPTERS = {
  ke5: { title:'第5课 · 看见别人被欺负，稳稳出手', seg: SEG5 },
  ke6: { title:'第6课 · 用一句公道话，站对的一边', seg: SEG6 },
  review: { title:'总复习 · 六课连成串', seg: SEG_REVIEW }
};
const ORDER = ['ke5','ke6','review'];

function getLines(s){ return (s.type==='ask') ? [s.q] : (s.lines||[]); }

/* ============ 语音（晓晓神经网络语音） ============ */
let voices=[], curVoice=null, speakingGen=0;
const synth = window.speechSynthesis;
function loadVoices(){
  voices = synth ? synth.getVoices() : [];
  const sel = document.getElementById('voiceSel'); sel.innerHTML='';
  const zh = voices.filter(v=>/^zh/i.test(v.lang));
  zh.forEach((v,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=v.name; sel.appendChild(o); });
  let idx = zh.findIndex(v=>/xiaoxiao|晓晓|neural/i.test(v.name));
  if(idx<0) idx = zh.findIndex(v=>/female|女|huihui|yaoyao|xiaoyi/i.test(v.name));
  if(idx>=0){ sel.value=idx; curVoice=zh[idx]; }
}
if(synth){ loadVoices(); synth.onvoiceschanged = loadVoices; }
document.getElementById('voiceSel').addEventListener('change',e=>{
  const zh=voices.filter(v=>/^zh/i.test(v.lang)); curVoice=zh[e.target.value];
});

function updateSub(t){ document.getElementById('subText').textContent = t||''; }
function globalIndexOf(seg,line){ for(let i=0;i<GLOBAL.length;i++){ if(GLOBAL[i].seg===seg && GLOBAL[i].line===line) return i; } return -1; }
function updateSent(seg, line){
  const n=getLines(SEG[seg]).length;
  document.getElementById('sentInfo').textContent = `第 ${line+1} / ${n} 句`;
  const gi=globalIndexOf(seg,line);
  if(gi>=0){ seek.value=gi; seekInfo.textContent=`${gi+1}/${GLOBAL.length}`; }
}

function speakLine(segIdx, lineIdx, cont, onDone){
  const s=SEG[segIdx]; const lines=getLines(s);
  if(lineIdx<0 || lineIdx>=lines.length){ onDone&&onDone(); return; }
  const myGen=++speakingGen;
  synth.cancel();
  const u=new SpeechSynthesisUtterance(lines[lineIdx]);
  u.lang='zh-CN'; u.rate=parseFloat(document.getElementById('rate').value); u.pitch=1.0;
  if(curVoice) u.voice=curVoice;
  const av=document.getElementById('teaAvatar'); av.classList.add('speaking');
  u.onend=()=>{
    if(myGen!==speakingGen) return;
    av.classList.remove('speaking');
    if(cont && lineIdx+1<lines.length){ speakLine(segIdx, lineIdx+1, true, onDone); }
    else { onDone&&onDone(); }
  };
  u.onerror=()=>{ if(myGen!==speakingGen) return; av.classList.remove('speaking'); onDone&&onDone(); };
  curLine=lineIdx; updateSub(lines[lineIdx]); updateSent(segIdx, lineIdx);
  synth.speak(u);
}

/* ============ DOM 引用 ============ */
const board=document.getElementById('board');
const segTag=document.getElementById('segTag');
const segTitle=document.getElementById('segTitle');
const segBody=document.getElementById('segBody');
const dots=document.getElementById('dots');
const askArea=document.getElementById('askArea');
const btnStart=document.getElementById('btnStart');
const btnPrev=document.getElementById('btnPrev');
const btnNext=document.getElementById('btnNext');
const btnReplay=document.getElementById('btnReplay');
const seek=document.getElementById('seek');
const seekInfo=document.getElementById('seekInfo');
const endNav=document.getElementById('endNav');

let curSeg=0, curLine=0, askAnswered=false, finished=false, curChapterKey=null;

function buildDots(){
  dots.innerHTML='';
  SEG.forEach((s,i)=>{ const d=document.createElement('div'); d.className='dot'; d.dataset.i=i;
    d.addEventListener('click',()=>{ if(synth) synth.cancel(); renderSeg(i); }); dots.appendChild(d); });
}
function refreshDots(){
  [...dots.children].forEach((d,i)=>{ d.className='dot'+(i<curSeg?' done':'')+(i===curSeg?' cur':''); });
}
function showSegControls(i){
  btnReplay.style.display='inline-block';
  btnNext.style.display='inline-block';
  btnPrev.style.display='inline-block';
  if(i+1>=SEG.length){ btnNext.textContent='✓ 本章完成'; } else { btnNext.textContent='下一句 ⤼'; }
}

function renderSeg(i, opt){
  opt=opt||{};
  curSeg=i; refreshDots(); askArea.innerHTML=''; askAnswered=false; finished=false;
  endNav.style.display='none';
  btnNext.style.display='none'; btnReplay.style.display='none'; btnPrev.style.display='inline-block';
  const s=SEG[i];
  if(s.type==='ask'){ renderAsk(s); return; }
  segTag.textContent = s.tag||'课堂';
  segTitle.textContent = s.title||'';
  let body = s.html||'';
  if(s.type==='peer'){ body += `<div class="peer"><div class="who">${s.who}：</div><div class="q">「${s.q}」</div></div>`; }
  segBody.innerHTML = body;
  const lines=getLines(s);
  let start = (opt.from==='last') ? Math.max(0,lines.length-1) : (opt.from||0);
  let cont = (opt.cont!==false);
  if(lines.length){ speakLine(i, start, cont, ()=>showSegControls(i)); }
}

function renderAsk(s){
  segTag.textContent='晓晓老师提问';
  segTitle.textContent='✋ 停一下，该你出场了';
  segBody.innerHTML = `<p>${s.q}</p>`;
  const box=document.createElement('div'); box.className='ask';
  let inner = `<div class="label">📝 你的回答（费曼记忆：讲出来才算懂）</div>`;
  if(s.mode==='choice'){
    inner += `<div class="opts">`+s.options.map((o,oi)=>`<div class="opt" data-i="${oi}">${o}</div>`).join('')+`</div>`;
  }else{
    inner += `<textarea id="ans" placeholder="${s.hint||'在这里写你的想法…'}"></textarea>`;
  }
  const fb=document.createElement('div'); fb.className='fb'; fb.id='fb';
  const go=document.createElement('button'); go.className='ctrl primary'; go.textContent='提交回答'; go.style.marginTop='10px';
  box.innerHTML=inner; box.appendChild(go); box.appendChild(fb); askArea.appendChild(box);

  if(s.mode==='choice'){
    box.querySelectorAll('.opt').forEach(opt=>{ opt.addEventListener('click',()=>{
      box.querySelectorAll('.opt').forEach(o=>o.classList.remove('pick')); opt.classList.add('pick'); }); });
    go.addEventListener('click',()=>{
      const picked=box.querySelector('.opt.pick'); if(!picked){ alert('先选一个答案哦～'); return; }
      const pi=+picked.dataset.i;
      box.querySelectorAll('.opt').forEach(o=>o.classList.remove('pick','right','wrong'));
      if(pi===s.answer){ picked.classList.add('right'); showFb('ok',s.fbOk); }
      else{ picked.classList.add('wrong'); box.querySelectorAll('.opt')[s.answer].classList.add('right'); showFb('no',s.fbNo); }
      go.style.display='none'; askAnswered=true; showSegControls(curSeg);
      speakLine(curSeg,0,false,null);
    });
  }else{
    go.addEventListener('click',()=>{
      const t=document.getElementById('ans').value.trim(); if(!t){ alert('先写几句吧，哪怕一句话也行～'); return; }
      showFb('ok', s.fbOk); go.style.display='none'; askAnswered=true; showSegControls(curSeg);
      speakLine(curSeg,0,false,null);
    });
  }
  function showFb(cls,txt){ fb.className='fb '+cls; fb.textContent=txt; }
  const gi=globalIndexOf(curSeg,0); if(gi>=0){ seek.value=gi; seekInfo.textContent=`${gi+1}/${GLOBAL.length}`; }
  speakLine(curSeg,0,false,null);
}

function prevSentence(){
  const s=SEG[curSeg];
  if(s.type==='ask'){ if(curSeg>0) renderSeg(curSeg-1); return; }
  speakingGen++; if(synth) synth.cancel();
  const lines=getLines(s);
  if(curLine>0){ speakLine(curSeg, curLine-1, false, null); }
  else if(curSeg>0){ renderSeg(curSeg-1, {from:'last', cont:false}); }
}
function nextSentence(){
  const s=SEG[curSeg];
  if(s.type==='ask'){
    if(askAnswered){ if(curSeg+1<SEG.length) renderSeg(curSeg+1); else finish(); }
    else { alert('先回答晓晓老师的问题，再往后走哦～'); }
    return;
  }
  speakingGen++; if(synth) synth.cancel();
  const lines=getLines(s);
  if(curLine < lines.length-1){ speakLine(curSeg, curLine+1, false, null); }
  else { if(curSeg+1<SEG.length) renderSeg(curSeg+1); else finish(); }
}

function mkBtn(label, fn){
  const b=document.createElement('button'); b.className='ctrl primary'; b.textContent=label;
  b.style.marginRight='8px'; b.addEventListener('click', fn); return b;
}

function finish(){
  finished=true; speakingGen++; if(synth) synth.cancel();
  const idx=ORDER.indexOf(curChapterKey); const nk=ORDER[idx+1];
  segTag.textContent='本章上完'; segTitle.textContent='🎉 这一章学完啦！';
  let body=`<p>这一章你跟晓晓老师学完啦！记住口诀，下次遇到类似场面，先在心里彩排一遍。</p>`;
  if(nk){
    body+=`<p>下一章：<b>${CHAPTERS[nk].title}</b>（点下面的按钮继续）</p>`;
  } else {
    body+=`<p>六课全套你已经串完一遍，真棒！随时回来复习，把口诀背熟。</p>`;
  }
  segBody.innerHTML=body;
  document.getElementById('subText').textContent='本章上完！可以选下一章或回目录。';
  btnNext.style.display='none'; btnReplay.style.display='none'; btnPrev.style.display='none'; btnStart.style.display='none';
  if(GLOBAL.length) seek.value=GLOBAL.length-1;
  refreshDots();
  endNav.innerHTML=''; endNav.style.display='flex';
  if(nk){ endNav.appendChild(mkBtn('下一章 ➜ '+CHAPTERS[nk].title.replace(/^第[56]课 · /,''), ()=>{ endNav.style.display='none'; loadChapter(nk); })); }
  endNav.appendChild(mkBtn('≡ 回章目录', ()=>{ endNav.style.display='none'; showMenu(); }));
}

function loadChapter(key){
  if(synth) synth.cancel();
  const ch=CHAPTERS[key]; if(!ch) return;
  SEG = JSON.parse(JSON.stringify(ch.seg));
  GLOBAL=[];
  SEG.forEach((s,si)=>{ const n=getLines(s).length; for(let l=0;l<n;l++) GLOBAL.push({seg:si,line:l}); });
  SEG.forEach(s=>{ if(s.type==='ask' && !s.lines) s.lines=[s.q]; });
  curChapterKey=key; curSeg=0; curLine=0; finished=false; askAnswered=false;
  seek.max = Math.max(0, GLOBAL.length-1);
  seek.value=0; seekInfo.textContent=`0/${GLOBAL.length}`;
  buildDots();
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active', c.dataset.k===key));
  btnStart.style.display='none'; endNav.style.display='none';
  renderSeg(0);
}

function showMenu(){
  if(synth) synth.cancel();
  btnStart.style.display='inline-block';
  btnNext.style.display='none'; btnPrev.style.display='none'; btnReplay.style.display='none';
  endNav.style.display='none';
  segTag.textContent='目录'; segTitle.textContent='📚 不慌课全集 · 选一章开始';
  segBody.innerHTML=`<p>这里把晓晓老师讲过的「不慌课」合成了一本：<b>第5课、第6课全文</b> ＋ <b>六课总复习</b>。每章都能用「晓晓（XiaoxiaoNeural）神经网络语音」讲给你听，带字幕、能拖播放位置、能上一句下一句。</p><p>上面的<b>章节卡片</b>点一下就开始那一章；想听真人录音版的第5课，点 <a href="buhuang-ke/" target="_blank">这里</a>。</p><p style="color:#9a9486;font-size:.85em">说明：第1–4课目前只保存在前几课的「复习小结」里（本工作区没有它们的独立全文页），所以全集以第5、6课全文 ＋ 总复习呈现。需要的话我可以再把第1–4课扩写成完整一页。</p>`;
  document.getElementById('subText').textContent='（选一章开始听）';
  refreshDots();
}

/* ============ 控制绑定 ============ */
btnStart.addEventListener('click',()=>{ loadChapter('ke5'); });
btnPrev.addEventListener('click', prevSentence);
btnNext.addEventListener('click', nextSentence);
btnReplay.addEventListener('click',()=>{
  const s=SEG[curSeg];
  if(s.type==='ask'){ speakLine(curSeg,0,false,null); }
  else { speakLine(curSeg, 0, true, ()=>showSegControls(curSeg)); }
});
seek.addEventListener('input', ()=>{
  const g=+seek.value; const m=GLOBAL[g]; if(!m) return;
  speakingGen++; if(synth) synth.cancel();
  renderSeg(m.seg, {from:m.line, cont:false});
});
document.getElementById('fontSel').addEventListener('change',e=>{
  document.documentElement.style.setProperty('--fs', e.target.value+'px');
});
document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',()=>{ loadChapter(c.dataset.k); });
});
document.documentElement.style.setProperty('--fs', document.getElementById('fontSel').value+'px');
showMenu();

</script>
</body>
</html>
